<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <title>Interview Prep Flashcards</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .quiz-container {
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        /* Flashcard Container styling */
        .flashcard {
            min-height: 280px;
            cursor: pointer;
            position: relative;
            perspective: 1200px;
        }

        .flashcard-inner {
            min-height: 280px;
            position: relative;
            display: grid;
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.2, 0.7, 0.2, 1);
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            background-color: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            min-height: 280px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            grid-area: 1 / 1;
            position: relative;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .flashcard:hover .flashcard-face {
            border-color: var(--accent);
            box-shadow: 0 15px 30px -5px rgba(56, 189, 248, 0.15);
        }

        .flashcard-back {
            transform: rotateY(180deg);
        }
        .tag {
            position: absolute;
            top: 20px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 4px 14px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .card-content {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 500;
            word-wrap: break-word;
            max-width: 100%;
        }
        .hint-text {
            position: absolute;
            bottom: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.025em;
        }
        /* Controls Layout */
        .controls {
            margin-top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        button:hover:not(:disabled) {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--bg-color);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #progress {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--card-bg);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h2 id="quiz-date">Daily Revision</h2>
        <div class="subtitle" id="quiz-subtitle">Fetching today's challenge...</div>
        
        <div class="flashcard" id="card" onclick="flipCard()">
            <div class="flashcard-inner">
                <div class="flashcard-face flashcard-front">
                    <span class="tag" id="front-card-tag">Topic</span>
                    <p class="card-content" id="question-text">Loading deck details...</p>
                    <div class="hint-text">Click card to reveal answer</div>
                </div>
                <div class="flashcard-face flashcard-back">
                    <span class="tag" id="back-card-tag">Topic</span>
                    <p class="card-content" id="answer-text">Loading answer...</p>
                    <div class="hint-text">Click card to return to question</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="prev-btn" onclick="prevCard()" disabled>Previous</button>
            <span id="progress">0 / 0</span>
            <button id="next-btn" onclick="nextCard()">Next</button>
        </div>
    </div>

    <script src="./assets/daily_questions.js"></script>
    <script>
        let questions = [];
        let currentIndex = 0;
        let isShowingAnswer = false;

        async function loadDailyQuiz() {
            try {
                let data;

                // Fetch the static JSON updated by GitHub Actions
                if (window.location.protocol === 'file:' && window.DAILY_QUESTIONS) {
                    data = window.DAILY_QUESTIONS;
                } else {
                    let response = await fetch('./assets/daily_questions.json');
                
                    if (!response.ok) {
                        throw new Error('Daily quiz file not found');
                    }

                    data = await response.json();
                }

                questions = data.questions;
                document.getElementById('quiz-date').innerText = `Daily Quiz (${data.date})`;
                document.getElementById('quiz-subtitle').innerText = "20 fresh questions picked across 10 FAANG interview topics.";
                
                renderCard();
            } catch (err) {
                document.getElementById('question-text').innerText = "Failed to load today's quiz. Ensure assets/daily_questions.json exists or run python generate_quiz.py locally.";
                document.getElementById('answer-text').innerText = "Connection / File missing error.";
                document.getElementById('quiz-subtitle').innerText = "Connection / File missing error.";
            }
        }

        function renderCard() {
            if (!questions.length) return;
            const current = questions[currentIndex];
            const frontTagEl = document.getElementById('front-card-tag');
            const backTagEl = document.getElementById('back-card-tag');
            const questionTextEl = document.getElementById('question-text');
            const answerTextEl = document.getElementById('answer-text');
            const progressEl = document.getElementById('progress');
            const cardEl = document.getElementById('card');

            // Format category name string
            const category = current.category.replace('_', ' ');
            frontTagEl.innerText = category;
            backTagEl.innerText = category;
            questionTextEl.innerText = current.question;
            answerTextEl.innerText = current.answer;
            cardEl.classList.toggle('flipped', isShowingAnswer);
            progressEl.innerText = `${currentIndex + 1} / ${questions.length}`;

            // Handle button disable states
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === questions.length - 1);
        }

        function flipCard() {
            isShowingAnswer = !isShowingAnswer;
            renderCard();
        }

        function nextCard() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                isShowingAnswer = false;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                isShowingAnswer = false;
                renderCard();
            }
        }

        // Run on mount
        loadDailyQuiz();
    </script>
</body>
</html>
