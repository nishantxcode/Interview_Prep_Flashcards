<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <title>Interview Prep Flashcards</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --accent-glow: rgba(56, 189, 248, 0.15);
        }

        body.light-theme {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #0284c7;
            --border: #cbd5e1;
            --shadow-color: rgba(15, 23, 42, 0.12);
            --accent-glow: rgba(2, 132, 199, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            padding: 0;
            border-radius: 50%;
            z-index: 10000;
            font-size: 1.15rem;
            line-height: 1;
        }

        .cursor-glow,
        .cursor-dot {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transform: translate3d(-50%, -50%, 0);
            transition: opacity 0.2s ease;
        }

        .cursor-glow {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent-glow), rgba(56, 189, 248, 0.08) 38%, transparent 70%);
            filter: blur(4px);
            mix-blend-mode: screen;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 16px rgba(56, 189, 248, 0.8);
        }

        body.cursor-active .cursor-glow,
        body.cursor-active .cursor-dot {
            opacity: 1;
        }

        @media (pointer: coarse) {
            .cursor-glow,
            .cursor-dot {
                display: none;
            }
        }
        .quiz-container {
            max-width: 550px;
            width: 100%;
            text-align: center;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        /* Flashcard Container styling */
        .flashcard {
            min-height: 280px;
            cursor: pointer;
            position: relative;
            perspective: 1200px;
        }

        .flashcard-inner {
            min-height: 280px;
            position: relative;
            display: grid;
            transform-style: preserve-3d;
            transition: transform 0.65s cubic-bezier(0.2, 0.7, 0.2, 1);
        }

        .flashcard.flipped .flashcard-inner {
            transform: rotateY(180deg);
        }

        .flashcard-face {
            background-color: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 16px;
            min-height: 280px;
            padding: 32px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            grid-area: 1 / 1;
            position: relative;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transition: background-color 0.25s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 25px -5px var(--shadow-color);
        }

        .flashcard:hover .flashcard-face {
            border-color: var(--accent);
            box-shadow: 0 15px 30px -5px var(--accent-glow);
        }

        .flashcard-back {
            transform: rotateY(180deg);
        }
        .tag {
            position: absolute;
            top: 20px;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 4px 14px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .card-content {
            font-size: 1.15rem;
            line-height: 1.6;
            font-weight: 500;
            word-wrap: break-word;
            max-width: 100%;
        }
        .hint-text {
            position: absolute;
            bottom: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.025em;
        }
        /* Controls Layout */
        .controls {
            margin-top: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease, opacity 0.2s ease;
        }
        button:hover:not(:disabled) {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--bg-color);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #progress {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--card-bg);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to light theme" title="Switch theme">☀</button>
    <div class="cursor-glow" id="cursor-glow"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <div class="quiz-container">
        <h2 id="quiz-date">Daily Revision</h2>
        <div class="subtitle" id="quiz-subtitle">Fetching today's challenge...</div>
        
        <div class="flashcard" id="card" onclick="flipCard()">
            <div class="flashcard-inner">
                <div class="flashcard-face flashcard-front">
                    <span class="tag" id="front-card-tag">Topic</span>
                    <p class="card-content" id="question-text">Loading deck details...</p>
                    <div class="hint-text">Click card to reveal answer</div>
                </div>
                <div class="flashcard-face flashcard-back">
                    <span class="tag" id="back-card-tag">Topic</span>
                    <p class="card-content" id="answer-text">Loading answer...</p>
                    <div class="hint-text">Click card to return to question</div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="prev-btn" onclick="prevCard()" disabled>Previous</button>
            <span id="progress">0 / 0</span>
            <button id="next-btn" onclick="nextCard()">Next</button>
        </div>
    </div>

    <script src="./assets/daily_questions.js"></script>
    <script>
        let questions = [];
        let currentIndex = 0;
        let isShowingAnswer = false;
        const cursorGlow = document.getElementById('cursor-glow');
        const cursorDot = document.getElementById('cursor-dot');
        const cursorPosition = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const glowPosition = { x: cursorPosition.x, y: cursorPosition.y };
        const themeToggle = document.getElementById('theme-toggle');

        function applyTheme(theme) {
            const isLight = theme === 'light';
            document.body.classList.toggle('light-theme', isLight);
            themeToggle.innerText = isLight ? '☾' : '☀';
            themeToggle.setAttribute('aria-label', isLight ? 'Switch to dark theme' : 'Switch to light theme');
        }

        function getInitialTheme() {
            const savedTheme = localStorage.getItem('theme');

            if (savedTheme) {
                return savedTheme;
            }

            return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        }

        async function loadDailyQuiz() {
            try {
                let data;

                // Fetch the static JSON updated by GitHub Actions
                if (window.location.protocol === 'file:' && window.DAILY_QUESTIONS) {
                    data = window.DAILY_QUESTIONS;
                } else {
                    let response = await fetch('./assets/daily_questions.json');
                
                    if (!response.ok) {
                        throw new Error('Daily quiz file not found');
                    }

                    data = await response.json();
                }

                questions = data.questions;
                document.getElementById('quiz-date').innerText = `Daily Quiz (${data.date})`;
                document.getElementById('quiz-subtitle').innerText = "20 fresh questions picked across 10 FAANG interview topics.";
                
                renderCard();
            } catch (err) {
                document.getElementById('question-text').innerText = "Failed to load today's quiz. Ensure assets/daily_questions.json exists or run python generate_quiz.py locally.";
                document.getElementById('answer-text').innerText = "Connection / File missing error.";
                document.getElementById('quiz-subtitle').innerText = "Connection / File missing error.";
            }
        }

        function renderCard() {
            if (!questions.length) return;
            const current = questions[currentIndex];
            const frontTagEl = document.getElementById('front-card-tag');
            const backTagEl = document.getElementById('back-card-tag');
            const questionTextEl = document.getElementById('question-text');
            const answerTextEl = document.getElementById('answer-text');
            const progressEl = document.getElementById('progress');
            const cardEl = document.getElementById('card');

            // Format category name string
            const category = current.category.replace('_', ' ');
            frontTagEl.innerText = category;
            backTagEl.innerText = category;
            questionTextEl.innerText = current.question;
            answerTextEl.innerText = current.answer;
            cardEl.classList.toggle('flipped', isShowingAnswer);
            progressEl.innerText = `${currentIndex + 1} / ${questions.length}`;

            // Handle button disable states
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === questions.length - 1);
        }

        function flipCard() {
            isShowingAnswer = !isShowingAnswer;
            renderCard();
        }

        function nextCard() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                isShowingAnswer = false;
                renderCard();
            }
        }

        function prevCard() {
            if (currentIndex > 0) {
                currentIndex--;
                isShowingAnswer = false;
                renderCard();
            }
        }

        function animateCursor() {
            glowPosition.x += (cursorPosition.x - glowPosition.x) * 0.14;
            glowPosition.y += (cursorPosition.y - glowPosition.y) * 0.14;

            cursorGlow.style.transform = `translate3d(${glowPosition.x}px, ${glowPosition.y}px, 0) translate(-50%, -50%)`;
            cursorDot.style.transform = `translate3d(${cursorPosition.x}px, ${cursorPosition.y}px, 0) translate(-50%, -50%)`;
            requestAnimationFrame(animateCursor);
        }

        window.addEventListener('pointermove', (event) => {
            cursorPosition.x = event.clientX;
            cursorPosition.y = event.clientY;
            document.body.classList.add('cursor-active');
        });

        window.addEventListener('pointerleave', () => {
            document.body.classList.remove('cursor-active');
        });

        themeToggle.addEventListener('click', () => {
            const nextTheme = document.body.classList.contains('light-theme') ? 'dark' : 'light';
            localStorage.setItem('theme', nextTheme);
            applyTheme(nextTheme);
        });

        // Run on mount
        applyTheme(getInitialTheme());
        animateCursor();
        loadDailyQuiz();
    </script>
</body>
</html>
